source = ~/.config/hypr/vars.conf
source = ~/.config/hypr/style.conf
source = ~/.config/hypr/keybinds.conf
source = ~/.config/hypr/input_devices.conf
source = ~/.config/hypr/window_rules.conf

################
### MONITORS ###
################

monitor=,preferred,auto,1.6

#################
### AUTOSTART ###
#################

exec-once = waybar
exec-once = hypridle
exec-once = wl-paste --type text --watch cliphist store # cliphist listener

# wallpaper
exec-once = swww-daemon & swww clear 101010 # this can break because no delay
# exec-once = swww-daemon & sleep 0.5 && swww clear 101010 # delay is safer because swww has time to load
# exec-once = swww-daemon
# exec = swww img ~/Pictures/wallpaper1.jpg


