windowrule {
    name = suppress_maximize
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = fix_xwayland_drag
    match:class = ^$
    match:title = ^$
    match:xwayland = 1
    match:float = 1
    match:fullscreen = 0
    match:pin = 0
    no_focus = 1
}

windowrule {
    name = wiremix_settings
    match:initial_title = ^(wiremix)$
    float = 1
    center = 1
    size = (monitor_w*0.5) (monitor_h*0.5)
}

windowrule {
    name = yazifloating_settings 
    match:initial_title = ^(yazi-float)$
    float = 1
    center = 1
    size = (monitor_w*0.67) (monitor_h*0.67)
}

windowrule {
    name = pythonfloating_settings 
    match:initial_title = ^(python-float)$
    float = 1
    center = 1
    size = (monitor_w*0.67) (monitor_h*0.67)
}

windowrule {
    name = nmtui_settings
    match:initial_title = ^(nmtui)$
    float = 1
    center = 1
    size = (monitor_w*0.4) (monitor_h*0.6)
}
